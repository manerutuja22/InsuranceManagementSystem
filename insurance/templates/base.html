{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Insurance Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #f5f7fb;
        font-family: "Segoe UI", sans-serif;
        color: #1f2937;
    }

    .sidebar {
        width: 250px;
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        background: linear-gradient(180deg, #111827, #1f2937);
        color: white;
        padding: 25px 15px;
    }

    .brand {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 40px;
        padding-left: 15px;
    }

    .brand i {
        margin-right: 10px;
    }

    .sidebar a {
        display: flex;
        align-items: center;
        color: #d1d5db;
        text-decoration: none;
        padding: 13px 15px;
        margin-bottom: 8px;
        border-radius: 10px;
        transition: 0.3s;
    }

    .sidebar a i {
        margin-right: 12px;
        font-size: 18px;
    }

    .sidebar a:hover {
        background: #374151;
        color: white;
    }

    .sidebar a.active {
        background: #2563eb;
        color: white;
    }

    .main-content {
        margin-left: 250px;
        min-height: 100vh;
    }

    .topbar {
        height: 70px;
        background: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        border-bottom: 1px solid #e5e7eb;
    }

    .topbar h5 {
        margin: 0;
        font-weight: 600;
    }

    .profile {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .profile-icon {
        width: 38px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #2563eb;
        color: white;
        border-radius: 50%;
    }

    .page-content {
        padding: 30px;
    }

    .page-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .page-title h2 {
        font-weight: 700;
        margin: 0;
    }

    .page-title p {
        color: #6b7280;
        margin-top: 5px;
    }

    .custom-card {
        background: white;
        border-radius: 15px;
        border: none;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
    }

    .btn {
        border-radius: 8px;
        padding: 9px 16px;
    }

    .table-card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
    }

    .table {
        margin-bottom: 0;
        vertical-align: middle;
    }

    .table thead {
        background: #f8fafc;
    }

    .table th {
        color: #6b7280;
        font-size: 14px;
        font-weight: 600;
    }

    .table td {
        padding: 15px 10px;
    }

    .status-active {
        background: #dcfce7;
        color: #15803d;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
    }

    .status-inactive {
        background: #fee2e2;
        color: #b91c1c;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
    }

    .form-card {
        max-width: 800px;
        margin: auto;
    }

    .form-label {
        font-weight: 600;
        color: #374151;
    }

    input,
    select {
        border-radius: 8px !important;
        padding: 10px !important;
    }

    .report-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 0;
        border-bottom: 1px solid #e5e7eb;
    }

    .report-row:last-child {
        border-bottom: none;
    }

    .report-row span {
        color: #6b7280;
    }

    .report-row strong {
        font-size: 18px;
        color: #111827;
    }

    .status-box {
        padding: 20px;
        text-align: center;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #f8fafc;
    }

    .status-box span {
        color: #6b7280;
        font-weight: 600;
    }

    .status-box h2 {
        margin-top: 10px;
        color: #2563eb;
    }

    @media (max-width: 768px) {
        .sidebar {
            width: 70px;
        }

        .brand span,
        .sidebar a span {
            display: none;
        }

        .sidebar a {
            justify-content: center;
        }

        .sidebar a i {
            margin: 0;
        }

        .main-content {
            margin-left: 70px;
        }

        .page-content {
            padding: 15px;
        }

        .page-title {
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
        }
    }
</style>
</head>

<body>

<div class="sidebar">
    <div class="brand">
        <i class="bi bi-shield-check"></i>
        <span>InsurePro</span>
    </div>

<a href="{% url 'customer_list' %}" class="{% if request.resolver_match.url_name == 'customer_list' or request.resolver_match.url_name == 'add_customer' or request.resolver_match.url_name == 'edit_customer' %}active{% endif %}">
    <i class="bi bi-people"></i>
    <span>Customers</span>
</a>

<a href="{% url 'policy_list' %}" class="{% if request.resolver_match.url_name == 'policy_list' or request.resolver_match.url_name == 'add_policy' or request.resolver_match.url_name == 'edit_policy' %}active{% endif %}">
    <i class="bi bi-file-earmark-text"></i>
    <span>Policies</span>
</a>

<a href="{% url 'lead_list' %}" class="{% if request.resolver_match.url_name == 'lead_list' or request.resolver_match.url_name == 'add_lead' or request.resolver_match.url_name == 'edit_lead' %}active{% endif %}">
    <i class="bi bi-person-lines-fill"></i>
    <span>Leads</span>
</a>

<a href="{% url 'reports' %}" class="{% if request.resolver_match.url_name == 'reports' %}active{% endif %}">
    <i class="bi bi-bar-chart"></i>
    <span>Reports</span>
</a>
</div>

<div class="main-content">

    <div class="topbar">
        <h5>Insurance Management System</h5>

        <div class="profile">
            <span>Admin</span>

            <div class="profile-icon">
                <i class="bi bi-person"></i>
            </div>
        </div>
    </div>

    <div class="page-content">
        {% block content %}
        {% endblock %}
    </div>

</div>

</body>
</html>
